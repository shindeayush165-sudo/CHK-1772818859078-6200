<style>

/* =========================
GLOBAL
========================= */

*{
box-sizing:border-box;
}

body{
margin:0;
background:black;
font-family:system-ui, Arial, Helvetica, sans-serif;
color:white;
overflow:hidden;
}

/* =========================
HEADER
========================= */

.app-header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:100;
}

/* FIXED GRADIENT LOGO */

.logo{
font-size:20px;
font-weight:700;
background:linear-gradient(90deg,#4f7cff,#00d4ff);

background-clip:text;
-webkit-background-clip:text;

color:transparent;
-webkit-text-fill-color:transparent;
}

/* =========================
SHORTS CONTAINER
========================= */

.shorts-container{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.shorts-container::-webkit-scrollbar{
display:none;
}

/* =========================
SINGLE SHORT
========================= */

.short{
height:100vh;
scroll-snap-align:start;
display:flex;
justify-content:center;
align-items:center;
position:relative;
padding-top:60px;
}

/* =========================
INSTAGRAM REEL EMBED
========================= */

.short iframe{
width:100%;
max-width:380px;
height:80vh;
border-radius:12px;
border:none;
}

/* =========================
OVERLAY UI
========================= */

.short-overlay{
position:absolute;
bottom:70px;
left:20px;
right:20px;
display:flex;
justify-content:space-between;
align-items:flex-end;
pointer-events:none;
}

/* TEXT SECTION */

.short-text{
max-width:70%;
}

.short-text h3{
margin:0;
font-size:16px;
}

.short-text p{
margin:4px 0;
font-size:14px;
color:#ccc;
}

/* ACTION BUTTONS */

.short-actions{
display:flex;
flex-direction:column;
gap:22px;
pointer-events:auto;
}

.short-actions button{
background:none;
border:none;
font-size:26px;
color:white;
cursor:pointer;
transition:0.2s;
}

.short-actions button:hover{
transform:scale(1.2);
}

/* =========================
BOTTOM NAVIGATION
========================= */

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
padding:12px 0;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:100;
}

.bottom-nav a{
color:white;
font-size:22px;
text-decoration:none;
transition:0.2s;
}

.bottom-nav a:hover{
transform:scale(1.2);
}

/* =========================
MOBILE RESPONSIVE
========================= */

@media (max-width:600px){

.short iframe{
height:75vh;
}

}

</style>

</head>
